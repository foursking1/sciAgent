repos:
  # Python linting (backend only)
  - repo: local
    hooks:
      - id: ruff-fix
        name: ruff fix
        entry: bash -c 'cd backend && uv run ruff check --fix .'
        language: system
        types: [python]
        pass_filenames: false

      - id: black
        name: black format
        entry: bash -c 'cd backend && uv run black .'
        language: system
        types: [python]
        pass_filenames: false

  # Frontend - ESLint
  - repo: local
    hooks:
      - id: eslint-fix
        name: eslint fix
        entry: bash -c 'cd frontend && npm run lint -- --fix'
        language: system
        types: [javascript, ts]
        pass_filenames: false
